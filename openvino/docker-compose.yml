services:

  # ── LLM: Qwen3-8B (INT4) ─────────────────────────────────────────────────
  # OpenAI-kompatible API: http://localhost:8081/v3/chat/completions
  ovms-qwen3:
    image: openvino/model_server:latest
    user: "${UID:-1000}:${GID:-1000}"
    restart: unless-stopped
    volumes:
      - /data/openvino/qwen3-8b-int4-cw-ov/1:/models/qwen3-8b:ro
    ports:
      - "9001:9000"   # gRPC
      - "8081:8080"   # REST / OpenAI-kompatibel
    command: >
      --model_repository_path /models
      --model_name qwen3-8b
      --task text_generation
      --target_device CPU
      --port 9000
      --rest_port 8080
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/v1/config"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

