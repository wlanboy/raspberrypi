<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fast Notes</title>
    <link rel="stylesheet" href="/static/style.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
    <div class="container">
        <h1>Fast Notes</h1>
        <input type="text" id="search" class="search-box" placeholder="Suche..." autofocus>
        <div id="notes-grid" class="grid"></div>
        <div id="loader" style="display: none;">Lade...</div>
    </div>

    <div id="note-modal" class="modal">
        <div class="modal-content">
            <span class="close-button">&times;</span>
            <button id="copy-btn" class="copy-main-btn">Inhalt kopieren</button>
            <div id="modal-body"></div>
        </div>
    </div>

    <script src="/static/script.js"></script>
</body>
</html>
